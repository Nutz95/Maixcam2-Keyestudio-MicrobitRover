; PlatformIO Project Configuration File

[platformio]
default_envs = nrf52_dk
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; micro:bit V2 : brancher le cable USB directement sur la carte micro:bit
; (pas sur le port serie MaixCam P1/P2).
;
; upload_protocol = mbed  -> copie le .hex sur le lecteur MICROBIT (recommande Windows)
; upload_protocol = cmsis-dap -> OpenOCD/SWD (si DAPLink est detecte)

[env:nrf52_dk]
platform = nordicnrf52
board = bbcmicrobit_v2
framework = arduino
upload_protocol = mbed
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = default

[env:nrf52_dk_cmsis]
platform = nordicnrf52
board = bbcmicrobit_v2
framework = arduino
upload_protocol = cmsis-dap
monitor_speed = 115200